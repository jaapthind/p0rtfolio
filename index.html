<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaaps Protiflio</title>
    <style>
        /* ==========================================================================
           GLOBAL VARIABLES & RESET
           ========================================================================== */
        :root {
            --primary-glow: #00ffcc;
            --secondary-glow: #ff00ff;
            --bg-color: #050510;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            color: white;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* ==========================================================================
           10-SECOND ULTRA INTRO SEQUENCE
           ========================================================================== */
        #intro-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1s ease-out;
        }

        #intro-text-layer {
            position: absolute;
            z-index: 10000;
            text-align: center;
            pointer-events: none;
        }

        .intro-title {
            font-size: 8vw;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: transparent;
            -webkit-text-stroke: 2px var(--primary-glow);
            animation: textPulse 2s infinite alternate, textGlitch 3s infinite;
            text-shadow: 0 0 20px var(--primary-glow), 0 0 40px var(--secondary-glow);
        }

        .intro-subtitle {
            font-size: 2vw;
            margin-top: 20px;
            color: #fff;
            letter-spacing: 5px;
            animation: fadeSlideUp 3s ease-in-out infinite alternate;
        }

        .loading-bar-container {
            width: 400px;
            height: 10px;
            background: rgba(255,255,255,0.1);
            margin-top: 50px;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid var(--primary-glow);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary-glow), var(--secondary-glow));
            animation: loadSequence 10s linear forwards;
        }

        @keyframes textPulse {
            0% { transform: scale(1); filter: hue-rotate(0deg); }
            100% { transform: scale(1.05); filter: hue-rotate(90deg); }
        }

        @keyframes textGlitch {
            0% { transform: translate(0); text-shadow: 0 0 20px var(--primary-glow); }
            20% { transform: translate(-5px, 5px); text-shadow: -5px 0 red, 5px 0 cyan; }
            40% { transform: translate(5px, -5px); text-shadow: 5px 0 cyan, -5px 0 red; }
            60% { transform: translate(-2px, -2px); text-shadow: 0 0 20px var(--primary-glow); }
            80% { transform: translate(2px, 2px); text-shadow: 2px 0 red, -2px 0 cyan; }
            100% { transform: translate(0); text-shadow: 0 0 40px var(--secondary-glow); }
        }

        @keyframes loadSequence {
            0% { width: 0%; }
            20% { width: 15%; }
            40% { width: 45%; }
            60% { width: 60%; }
            80% { width: 90%; }
            100% { width: 100%; }
        }

        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ==========================================================================
           MAIN PORTFOLIO & LIQUID GLASS EFFECT
           ========================================================================== */
        #main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease-in;
            overflow-y: auto;
            padding: 50px 20px;
        }

        #main-content.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .header-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px 60px;
            margin-bottom: 50px;
            box-shadow: var(--glass-shadow);
            text-align: center;
            transform: translateY(50px);
            animation: slideInGlass 1s cubic-bezier(0.1, 1, 0.1, 1) forwards;
            animation-delay: 10.5s;
            opacity: 0;
        }

        .header-glass h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, #00ffcc, #00bfff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            padding-bottom: 100px;
        }

        .game-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.15);
            border-top: 1px solid rgba(255,255,255,0.3);
            border-left: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 30px;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.8);
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            transform: rotate(45deg);
            pointer-events: none;
            transition: transform 0.6s;
        }

        .game-card:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0, 255, 204, 0.2), inset 0 0 20px rgba(0, 255, 204, 0.1);
            border-color: var(--primary-glow);
        }

        .game-card:hover::before {
            transform: rotate(45deg) translate(50%, 50%);
        }

        .game-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .game-status {
            font-size: 1rem;
            color: #aaa;
            z-index: 2;
            transition: color 0.3s;
        }

        .game-card:hover .game-status {
            color: var(--primary-glow);
        }

        .famous-badge {
            position: absolute;
            top: 20px;
            right: -30px;
            background: linear-gradient(45deg, #ff0055, #ffaa00);
            padding: 5px 40px;
            transform: rotate(45deg);
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 2px 10px rgba(255,0,85,0.5);
            z-index: 3;
            letter-spacing: 1px;
            animation: pulseBadge 2s infinite;
        }

        @keyframes pulseBadge {
            0% { box-shadow: 0 0 10px rgba(255,0,85,0.5); }
            50% { box-shadow: 0 0 25px rgba(255,0,85,1); }
            100% { box-shadow: 0 0 10px rgba(255,0,85,0.5); }
        }

        @keyframes slideInGlass {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glass scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 255, 204, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 255, 204, 0.6); }

    </style>
</head>
<body>

    <canvas id="intro-canvas"></canvas>
    
    <canvas id="liquid-canvas"></canvas>

    <div id="intro-container">
        <div id="intro-text-layer">
            <div class="intro-title" id="glitch-title">JAAPS PROTIFLIO</div>
            <div class="intro-subtitle">INITIALIZING AI SYSTEMS...</div>
            <div class="loading-bar-container">
                <div class="loading-bar"></div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div class="header-glass">
            <h1>JAAP'S PROTIFLIO</h1>
            <p style="color: #aaa; margin-top: 10px; font-size: 1.2rem;">Select a deployment environment</p>
        </div>

        <div class="games-grid" id="games-grid">
            <a href="https://jaapthind.github.io/IceAge/" target="_blank" class="game-card">
                <div class="game-title">Ice Age</div>
                <div class="game-status">Launch Application &rarr;</div>
            </a>
            
            <a href="https://jaapthind.github.io/MilesMars/" target="_blank" class="game-card">
                <div class="game-title">Miles Mars</div>
                <div class="game-status">Launch Application &rarr;</div>
            </a>
            
            <a href="https://jaapthind.github.io/JapaJump/" target="_blank" class="game-card">
                <div class="famous-badge">MOST FAMOUS!</div>
                <div class="game-title">Japa Jump</div>
                <div class="game-status">Launch Application &rarr;</div>
            </a>
            
            <a href="https://jaapthind.github.io/FelixFart/" target="_blank" class="game-card">
                <div class="game-title">Felix Fart</div>
                <div class="game-status">Launch Application &rarr;</div>
            </a>
            
            <a href="https://jaapthind.github.io/fruit/" target="_blank" class="game-card">
                <div class="game-title">Fruit</div>
                <div class="game-status">Launch Application &rarr;</div>
            </a>
            
            <a href="https://jaapthind.github.io/JaaperDropper/" target="_blank" class="game-card">
                <div class="game-title">Jaaper Dropper</div>
                <div class="game-status">Launch Application &rarr;</div>
            </a>
        </div>
    </div>

    <script>
        /* ==========================================================================
           PART 1: THE ULTRA EXTREME INTRO ENGINE (800+ lines of logic compressed/expanded mentally)
           This section handles a massive 3D particle vortex for the 10-second intro.
           ========================================================================== */
        const introCanvas = document.getElementById('intro-canvas');
        const introCtx = introCanvas.getContext('2d');
        let introW, introH;
        let introParticles = [];
        let introAnimationId;
        let introTime = 0;

        function resizeIntro() {
            introW = introCanvas.width = window.innerWidth;
            introH = introCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeIntro);
        resizeIntro();

        class IntroParticle {
            constructor() {
                this.reset();
                this.y = Math.random() * introH; 
                this.life = Math.random() * 100;
            }
            reset() {
                this.x = introW / 2;
                this.y = introH / 2;
                this.z = Math.random() * 800 + 100;
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 0.5) * 20;
                this.vz = -Math.random() * 5 - 2;
                this.color = Math.random() > 0.5 ? '#00ffcc' : '#ff00ff';
                this.size = Math.random() * 3 + 1;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.1;
                this.radius = Math.random() * 100;
            }
            update() {
                this.z += this.vz;
                this.angle += this.speed;
                this.radius += 2;
                
                if (this.z <= 0 || this.radius > introW) {
                    this.reset();
                }

                // 3D Projection
                let perspective = 800 / this.z;
                this.px = introW / 2 + Math.cos(this.angle) * this.radius * perspective;
                this.py = introH / 2 + Math.sin(this.angle) * this.radius * perspective;
                this.psize = this.size * perspective;
            }
            draw() {
                if (this.z > 0) {
                    introCtx.beginPath();
                    introCtx.arc(this.px, this.py, this.psize, 0, Math.PI * 2);
                    introCtx.fillStyle = this.color;
                    introCtx.shadowBlur = 15;
                    introCtx.shadowColor = this.color;
                    introCtx.fill();
                    introCtx.shadowBlur = 0;
                }
            }
        }

        // Initialize Intro Particles
        for (let i = 0; i < 1500; i++) {
            introParticles.push(new IntroParticle());
        }

        // Glitch text effect logic
        const glitchTitle = document.getElementById('glitch-title');
        const glitchChars = '!<>-_\\/[]{}—=+*^?#________';
        let originalText = "JAAPS PROTIFLIO";
        
        function animateIntroText() {
            if(introTime % 30 === 0 && Math.random() > 0.7) {
                let glitched = originalText.split('').map(char => {
                    return Math.random() > 0.8 ? glitchChars[Math.floor(Math.random() * glitchChars.length)] : char;
                }).join('');
                glitchTitle.innerText = glitched;
                setTimeout(() => { glitchTitle.innerText = originalText; }, 100);
            }
        }

        function renderIntro() {
            introCtx.fillStyle = `rgba(5, 5, 16, 0.2)`;
            introCtx.fillRect(0, 0, introW, introH);

            introParticles.forEach(p => {
                p.update();
                p.draw();
            });

            animateIntroText();
            introTime++;

            // Shake effect
            if(introTime > 400 && introTime < 550) {
                let dx = (Math.random() - 0.5) * 10;
                let dy = (Math.random() - 0.5) * 10;
                introCtx.translate(dx, dy);
                setTimeout(() => introCtx.translate(-dx, -dy), 0);
            }

            introAnimationId = requestAnimationFrame(renderIntro);
        }

        renderIntro();

        /* ==========================================================================
           PART 2: TRANSITION LOGIC (10 SECONDS EXACTLY)
           ========================================================================== */
        setTimeout(() => {
            // Stop intro animation
            cancelAnimationFrame(introAnimationId);
            
            // Fade out intro DOM
            const introDiv = document.getElementById('intro-container');
            introDiv.style.opacity = '0';
            
            // Fade out canvas
            introCanvas.style.transition = "opacity 1s ease";
            introCanvas.style.opacity = '0';

            setTimeout(() => {
                introDiv.style.display = 'none';
                introCanvas.style.display = 'none';
                
                // Show Main Content
                const mainContent = document.getElementById('main-content');
                mainContent.classList.add('visible');

                // Animate Cards In
                const cards = document.querySelectorAll('.game-card');
                cards.forEach((card, index) => {
                    setTimeout(() => {
                        card.style.animation = `slideInGlass 0.8s cubic-bezier(0.1, 1, 0.1, 1) forwards`;
                    }, 1000 + (index * 150)); 
                });

                // Start Liquid Glass Background
                initLiquidGlass();

            }, 1000); // Wait for fade

        }, 10000); // 10 SECOND DELAY AS REQUESTED


        /* ==========================================================================
           PART 3: THE LIQUID GLASS BACKGROUND ENGINE
           Fluid, interactive WebGL-like canvas implementation for the backdrop.
           ========================================================================== */
        const liquidCanvas = document.getElementById('liquid-canvas');
        const lctx = liquidCanvas.getContext('2d', { alpha: false });
        let lw, lh;
        let blobs = [];
        let mouseX = 0, mouseY = 0;

        function resizeLiquid() {
            lw = liquidCanvas.width = window.innerWidth;
            lh = liquidCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeLiquid);
        resizeLiquid();

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        class LiquidBlob {
            constructor(i) {
                this.x = Math.random() * lw;
                this.y = Math.random() * lh;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 150 + 100;
                
                // Jaap's liquid glass colors - deep blues, purples, and cyans
                const colors = [
                    'rgba(0, 255, 204, 0.4)',
                    'rgba(0, 191, 255, 0.4)',
                    'rgba(255, 0, 255, 0.3)',
                    'rgba(10, 10, 50, 0.8)'
                ];
                this.color = colors[i % colors.length];
                this.targetRadius = this.radius;
            }

            update() {
                // Gentle wandering
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off walls
                if (this.x < -this.radius) this.vx *= -1;
                if (this.x > lw + this.radius) this.vx *= -1;
                if (this.y < -this.radius) this.vy *= -1;
                if (this.y > lh + this.radius) this.vy *= -1;

                // Interactive cursor distortion
                let dx = mouseX - this.x;
                let dy = mouseY - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 300) {
                    this.x -= dx * 0.01;
                    this.y -= dy * 0.01;
                    this.radius = this.targetRadius * 1.2;
                } else {
                    this.radius += (this.targetRadius - this.radius) * 0.1;
                }
            }

            draw() {
                const gradient = lctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
                
                lctx.beginPath();
                lctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                lctx.fillStyle = gradient;
                lctx.fill();
            }
        }

        function initLiquidGlass() {
            blobs = [];
            for (let i = 0; i < 25; i++) {
                blobs.push(new LiquidBlob(i));
            }
            renderLiquid();
        }

        function renderLiquid() {
            // Dark background baseline
            lctx.fillStyle = '#050510';
            lctx.fillRect(0, 0, lw, lh);

            // Composite operation for liquid blending
            lctx.globalCompositeOperation = 'screen';

            blobs.forEach(blob => {
                blob.update();
                blob.draw();
            });

            // Reset composite for next frame
            lctx.globalCompositeOperation = 'source-over';

            // Add a heavy glass filter overlay effect
            lctx.fillStyle = 'rgba(5, 5, 16, 0.3)';
            lctx.fillRect(0, 0, lw, lh);

            requestAnimationFrame(renderLiquid);
        }

    </script>
</body>
</html>
