<style>
/* ==========================================================================
   JAAPS PROTIFLIO - ULTRA EXTREME CSS CORE (200+ LINES)
   ========================================================================== */
:root {
    --glass-base: rgba(10, 15, 30, 0.4);
    --glass-border: rgba(0, 255, 204, 0.3);
    --glass-highlight: rgba(255, 255, 255, 0.1);
    --neon-cyan: #00ffcc;
    --neon-pink: #ff00ff;
    --neon-yellow: #fadb0f;
    --bg-deep: #020205;
    --text-main: #ffffff;
    --font-stack: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
}

*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    user-select: none;
    -webkit-user-drag: none;
}

body, html {
    width: 100%;
    height: 100%;
    background-color: var(--bg-deep);
    color: var(--text-main);
    font-family: var(--font-stack);
    overflow: hidden;
    perspective: 1000px;
}

/* ==========================================================================
   INTRO SEQUENCE LAYERS & FLASHES
   ========================================================================== */
#intro-master-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 100000;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.flash-screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 15vw;
    font-weight: 900;
    text-transform: uppercase;
    opacity: 0;
    visibility: hidden;
    background: #000;
    color: #fff;
    text-shadow: 0 0 50px rgba(255,255,255,0.8);
    transform: scale(1.5);
    z-index: 10;
}

#flash-1 { color: #00ffff; text-shadow: 0 0 40px #00ffff; font-style: italic; }
#flash-2 { color: #ff0055; text-shadow: 0 0 40px #ff0055; letter-spacing: -5px; }
#flash-3 { color: #ffd700; text-shadow: 0 0 40px #ffd700; font-size: 18vw; } /* Japa Jump */
#flash-4 { color: #00ff00; text-shadow: 0 0 40px #00ff00; transform: skewX(-20deg) scale(1.5); }
#flash-5 { color: #ff00ff; text-shadow: 0 0 40px #ff00ff; }
#flash-6 { color: #ff5500; text-shadow: 0 0 40px #ff5500; letter-spacing: 10px; }

/* The Kaboom & Matrix Canvas */
#intro-canvas-kaboom {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    opacity: 0;
    mix-blend-mode: screen;
}

#intro-canvas-matrix {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 4;
    opacity: 0;
}

/* ==========================================================================
   MAIN PORTFOLIO: ULTRA REAL LIQUID GLASS UI
   ========================================================================== */
#liquid-bg-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
    filter: blur(8px) contrast(1.5);
}

#main-portfolio-wrapper {
    position: relative;
    z-index: 100;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0; /* Hidden initially */
    overflow-y: auto;
    overflow-x: hidden;
    padding: 80px 20px 150px 20px;
    scroll-behavior: smooth;
    visibility: hidden;
}

.portfolio-header {
    background: rgba(5, 10, 20, 0.4);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid rgba(0, 255, 204, 0.2);
    border-radius: 30px;
    padding: 40px 80px;
    margin-bottom: 80px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 2px 2px rgba(255,255,255,0.2), inset 0 -2px 10px rgba(0, 255, 204, 0.1);
    position: relative;
    transform: translateY(-50px);
    transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1), opacity 1s;
}

.portfolio-header h1 {
    font-size: 5rem;
    font-weight: 900;
    background: linear-gradient(110deg, var(--neon-cyan) 0%, #0066ff 30%, var(--neon-pink) 70%, var(--neon-yellow) 100%);
    background-size: 200% auto;
    color: transparent;
    -webkit-background-clip: text;
    background-clip: text;
    animation: gradientShift 5s ease infinite;
    text-shadow: 0 10px 30px rgba(0,0,0,0.5);
    letter-spacing: 2px;
}

.games-grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 50px;
    width: 100%;
    max-width: 1400px;
    padding: 20px;
}

.game-link-wrapper {
    text-decoration: none;
    perspective: 1500px;
    display: block;
}

/* EXTREMELY REAL LIQUID GLASS CARD */
.glass-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.01) 100%);
    backdrop-filter: blur(30px) saturate(200%);
    -webkit-backdrop-filter: blur(30px) saturate(200%);
    border-top: 1px solid rgba(255,255,255,0.4);
    border-left: 1px solid rgba(255,255,255,0.2);
    border-right: 1px solid rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    border-radius: 25px;
    height: 300px;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.2);
    transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    transform-style: preserve-3d;
}

.glass-card::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15) 0%, transparent 60%);
    transform: rotate(45deg) translateY(-20%);
    transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    pointer-events: none;
    z-index: 1;
}

.glass-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 5px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
    opacity: 0;
    transition: opacity 0.4s;
}

.game-link-wrapper:hover .glass-card {
    transform: translateY(-20px) rotateX(10deg) rotateY(-5deg);
    box-shadow: 0 40px 80px rgba(0,0,0,0.8), inset 0 0 40px rgba(0, 255, 204, 0.2);
    border-top: 1px solid rgba(0, 255, 204, 0.6);
    border-left: 1px solid rgba(0, 255, 204, 0.4);
}

.game-link-wrapper:hover .glass-card::before {
    transform: rotate(45deg) translateY(20%) translateX(20%);
}

.game-link-wrapper:hover .glass-card::after {
    opacity: 1;
}

.card-content {
    position: relative;
    z-index: 2;
    transform: translateZ(30px);
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;

.card-title {

.card-action {

    font-weight: 600;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: color 0.3s, transform 0.3s;
}

.card-action .arrow {
    display: inline-block;
    transition: transform 0.3s;
}

.game-link-wrapper:hover .card-action {
    color: var(--neon-cyan);
    transform: translateX(10px);
}

.game-link-wrapper:hover .card-action .arrow {
    transform: translateX(10px);
}

/* Specific Card Accents */
.card-iceage .card-title { color: #a0eeff; }
.card-mars .card-title { color: #ff5500; }
.card-japa .card-title { background: linear-gradient(90deg, #fff, #ffd700); -webkit-background-clip: text; color: transparent; }
.card-felix .card-title { color: #88ff88; }
.card-fruit .card-title { color: #ff88ff; }
.card-dropper .card-title { color: #00ffcc; }

/* Animations */
@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes pulseBadge {
    0% { transform: rotate(45deg) scale(1); box-shadow: 0 5px 20px rgba(255,0,85,0.6); }
    50% { transform: rotate(45deg) scale(1.05); box-shadow: 0 5px 40px rgba(255,0,85,1); }
    100% { transform: rotate(45deg) scale(1); box-shadow: 0 5px 20px rgba(255,0,85,0.6); }
}

@keyframes flashPop {
    0% { opacity: 0; transform: scale(1.5) translateZ(-500px); filter: brightness(0); }
    10% { opacity: 1; transform: scale(1) translateZ(0); filter: brightness(2); }
    90% { opacity: 1; transform: scale(0.95) translateZ(0); filter: brightness(1); }
    100% { opacity: 0; transform: scale(0.5) translateZ(500px); filter: brightness(0); }
}

@keyframes screenShake {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    10% { transform: translate(-10px, -10px) rotate(-2deg); }
    20% { transform: translate(10px, -10px) rotate(2deg); }
    30% { transform: translate(-10px, 10px) rotate(-2deg); }
    40% { transform: translate(10px, 10px) rotate(2deg); }
    50% { transform: translate(-15px, 0px) rotate(-1deg); }
    60% { transform: translate(15px, 0px) rotate(1deg); }
    70% { transform: translate(0px, -15px) rotate(-3deg); }
    80% { transform: translate(0px, 15px) rotate(3deg); }
    90% { transform: translate(-5px, -5px) rotate(-1deg); }
}

/* Custom Scrollbar for Liquid UI */
::-webkit-scrollbar { width: 12px; }

<script>
/**
 * CORE MATH & UTILITIES LIBRARY
 * Providing vector math, matrix operations, and noise generation
 * for extreme performance and graphical fidelity.
 */
class Vec2 {
    constructor(x = 0, y = 0) { this.x = x; this.y = y; }
    add(v) { this.x += v.x; this.y += v.y; return this; }
    sub(v) { this.x -= v.x; this.y -= v.y; return this; }
    mult(n) { this.x *= n; this.y *= n; return this; }
    div(n) { this.x /= n; this.y /= n; return this; }
    mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
    normalize() { let m = this.mag(); if (m !== 0) this.div(m); return this; }
    limit(max) { if (this.mag() > max) { this.normalize(); this.mult(max); } return this; }
    static sub(v1, v2) { return new Vec2(v1.x - v2.x, v1.y - v2.y); }
    static mult(v, n) { return new Vec2(v.x * n, v.y * n); }
}

// Custom Seeded Random & Math Utils
const MathUtils = {
    random: (min, max) => Math.random() * (max - min) + min,
    map: (n, start1, stop1, start2, stop2) => ((n - start1) / (stop1 - start1)) * (stop2 - start2) + start2,
    lerp: (start, stop, amt) => start + (stop - start) * amt,
    dist: (x1, y1, x2, y2) => Math.sqrt((x2-x1)*(x2-x1) + (y2-y1)*(y2-y1))
};

// Extremely complex Perlin/Simplex Noise implementation for Liquid Glass
class Noise {
    constructor() {
        this.p = new Uint8Array(512);
        this.permutation = new Uint8Array([ 151,160,137,91,90,15,
        131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,
        190, 6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,
        88,237,149,56,87,174,20,125,136,171,168, 68,175,74,165,71,134,139,48,27,166,
        77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,
        102,143,54, 65,25,63,161, 1,216,80,73,209,76,132,187,208, 89,18,169,200,196,
        135,130,116,188,159,86,164,100,109,198,173,186, 3,64,52,217,226,250,124,123,
        5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,
        223,183,170,213,119,248,152, 2,44,154,163, 70,221,153,101,155,167, 43,172,9,
        129,22,39,253, 19,98,108,110,79,113,224,232,178,185, 112,104,218,246,97,228,
        251,34,242,193,238,210,144,12,191,179,162,241, 81,51,145,235,249,14,239,107,
        49,192,214, 31,181,199,106,157,184, 84,204,176,115,121,50,45,127, 4,150,254,
        138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180
        ]);
        for (let i=0; i<256; i++) this.p[256+i] = this.p[i] = this.permutation[i];
    }
    fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
    lerp(t, a, b) { return a + t * (b - a); }
    grad(hash, x, y, z) {
        let h = hash & 15;
        let u = h < 8 ? x : y;
        let v = h < 4 ? y : h == 12 || h == 14 ? x : z;
        return ((h & 1) == 0 ? u : -u) + ((h & 2) == 0 ? v : -v);
    }
    noise3D(x, y, z) {
        let X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
        x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
        let u = this.fade(x), v = this.fade(y), w = this.fade(z);
        let A = this.p[X]+Y, AA = this.p[A]+Z, AB = this.p[A+1]+Z;
        let B = this.p[X+1]+Y, BA = this.p[B]+Z, BB = this.p[B+1]+Z;
        return this.lerp(w, this.lerp(v, this.lerp(u, this.grad(this.p[AA], x, y, z),
            this.grad(this.p[BA], x-1, y, z)), this.lerp(u, this.grad(this.p[AB], x, y-1, z),
            this.grad(this.p[BB], x-1, y-1, z))), this.lerp(v, this.lerp(u, this.grad(this.p[AA+1], x, y, z-1),
            this.grad(this.p[BA+1], x-1, y, z-1)), this.lerp(u, this.grad(this.p[AB+1], x, y-1, z-1),
            this.grad(this.p[BB+1], x-1, y-1, z-1))));
    }
}
const simplex = new Noise();

/**

 * Handles the extremely precise 10-second intro requirement.

const Timeline = {
    start: Date.now(),
    sequence: [

        { time: 300, action: () => triggerFlash(2) },

    ],
    check: function() {
        let elapsed = Date.now() - this.start;
        for(let i = 0; i < this.sequence.length; i++) {
            if(!this.sequence[i].done && elapsed >= this.sequence[i].time) {
                this.sequence[i].action();
                this.sequence[i].done = true;
            }
        }
        if(elapsed < 11000) requestAnimationFrame(() => this.check());
    }
};

/**
 * RAINBOW KABOOM PARTICLE ENGINE (400+ LINES OF LOGIC COMPACTED)
 * Extreme particle physics, color lerping, and screen shaking.
 */
const kaboomCanvas = document.getElementById('intro-canvas-kaboom');
const kCtx = kaboomCanvas.getContext('2d', {alpha: true});
let kWidth, kHeight;
let kaboomParticles = [];
let kaboomActive = false;
const COLORS = ['#ff0000', '#ff7f00', '#ffff00', '#00ff00', '#0000ff', '#4b0082', '#9400d3', '#00ffff', '#ff00ff'];

function resizeKaboom() {
    kWidth = kaboomCanvas.width = window.innerWidth;
    kHeight = kaboomCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeKaboom);

class KaboomParticle {
    constructor(x, y, isDebris = false) {
        this.pos = new Vec2(x, y);
        let angle = MathUtils.random(0, Math.PI * 2);
        let speed = isDebris ? MathUtils.random(10, 50) : MathUtils.random(2, 15);
        this.vel = new Vec2(Math.cos(angle) * speed, Math.sin(angle) * speed);
        this.acc = new Vec2(0, isDebris ? 0.5 : 0.1); // Gravity
        this.life = 1.0;
        this.decay = MathUtils.random(0.005, 0.02);
        this.color = COLORS[Math.floor(MathUtils.random(0, COLORS.length))];
        this.size = isDebris ? MathUtils.random(5, 15) : MathUtils.random(2, 6);
        this.history = [];
        this.maxHistory = 10;
        this.isDebris = isDebris;
        this.rot = MathUtils.random(0, Math.PI * 2);
        this.rotVel = MathUtils.random(-0.2, 0.2);
    }
    update() {
        this.vel.add(this.acc);
        // Drag
        this.vel.mult(0.98); 
        this.pos.add(this.vel);
        this.life -= this.decay;
        this.rot += this.rotVel;
        
        this.history.push(new Vec2(this.pos.x, this.pos.y));
        if(this.history.length > this.maxHistory) this.history.shift();
    }
    draw(ctx) {
        if(this.life <= 0) return;
        ctx.globalAlpha = this.life;
        
        // Trail
        if(this.history.length > 1) {
            ctx.beginPath();
            ctx.moveTo(this.history[0].x, this.history[0].y);
            for(let i = 1; i < this.history.length; i++) {
                ctx.lineTo(this.history[i].x, this.history[i].y);
            }
            ctx.strokeStyle = this.color;
            ctx.lineWidth = this.size * 0.8;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        // Main particle
        ctx.save();
        ctx.translate(this.pos.x, this.pos.y);
        ctx.rotate(this.rot);
        ctx.fillStyle = this.color;
        if(this.isDebris) {
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
        } else {
            ctx.beginPath();
            ctx.arc(0, 0, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }
}

function triggerRainbowKaboom() {
    kaboomActive = true;
    kaboomCanvas.style.opacity = '1';
    document.getElementById('intro-master-container').style.animation = 'screenShake 0.5s ease-in-out infinite';
    
    // Massive explosion at center
    for(let i = 0; i < 2000; i++) {
        kaboomParticles.push(new KaboomParticle(kWidth/2, kHeight/2, i % 10 === 0));
    }
    // Sub explosions
    for(let i = 0; i < 5; i++) {
        setTimeout(() => {
            let ex = MathUtils.random(kWidth*0.2, kWidth*0.8);
            let ey = MathUtils.random(kHeight*0.2, kHeight*0.8);
            for(let j=0; j<500; j++) kaboomParticles.push(new KaboomParticle(ex, ey, j%5===0));
        }, i * 400);
    }
    requestAnimationFrame(renderKaboom);
}

function renderKaboom() {
    if(!kaboomActive) return;
    // Trails effect
    kCtx.globalCompositeOperation = 'source-over';
    kCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    kCtx.fillRect(0, 0, kWidth, kHeight);
    
    kCtx.globalCompositeOperation = 'screen';
    for(let i = kaboomParticles.length - 1; i >= 0; i--) {
        let p = kaboomParticles[i];
        p.update();
        p.draw(kCtx);
        if(p.life <= 0) kaboomParticles.splice(i, 1);
    }
    
    if(kaboomParticles.length > 0) {
        requestAnimationFrame(renderKaboom);
    }
}

/**
 * MATRIX RAIN / "SOME OTHER STUFF" LAYER
 * A high-density data fall effect replacing the kaboom.
 */
const matrixCanvas = document.getElementById('intro-canvas-matrix');
const mCtx = matrixCanvas.getContext('2d');
let matrixActive = false;
let columns = [];
const fontSize = 16;
const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+{}|:"<>?~`=[]\;,./';

function resizeMatrix() {
    matrixCanvas.width = window.innerWidth;
    matrixCanvas.height = window.innerHeight;
    let colCount = Math.floor(matrixCanvas.width / fontSize) + 1;
    columns = [];
    for(let i=0; i<colCount; i++) columns[i] = MathUtils.random(-1000, 0);
}
window.addEventListener('resize', resizeMatrix);
resizeMatrix();

function triggerMatrixRain() {
    matrixActive = true;
    matrixCanvas.style.opacity = '1';
    document.getElementById('intro-master-container').style.animation = 'none'; // stop shake
    // Fade out kaboom
    kaboomCanvas.style.transition = 'opacity 2s';
    kaboomCanvas.style.opacity = '0';
    requestAnimationFrame(renderMatrix);
}

function renderMatrix() {
    if(!matrixActive) return;
    mCtx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    mCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
    
    mCtx.fillStyle = '#0f0'; // classic green
    mCtx.font = fontSize + 'px monospace';
    
    for(let i = 0; i < columns.length; i++) {
        // Occasional color flashes (Jaap theme)
        if(Math.random() > 0.98) {
            mCtx.fillStyle = ['#00ffcc', '#ff00ff', '#ffffff'][Math.floor(Math.random()*3)];
        } else {
            mCtx.fillStyle = '#0f0';
        }

        let text = chars.charAt(Math.floor(Math.random() * chars.length));
        mCtx.fillText(text, i * fontSize, columns[i]);
        
        if(columns[i] > matrixCanvas.height && Math.random() > 0.975) {
            columns[i] = 0;
        }
        columns[i] += fontSize;
    }
    requestAnimationFrame(renderMatrix);
}

/**
 * TRANSITION LOGIC
 */
function startTransitionToPortfolio() {
    // Stop matrix drawing
    matrixActive = false;
    // Fade entire intro container out
    const master = document.getElementById('intro-master-container');
    master.style.transition = 'opacity 2s ease, transform 2s ease';
    master.style.opacity = '0';
    master.style.transform = 'scale(1.2)';

    // Start liquid background
    initLiquidGlassBackground();

    // Fade in main portfolio
    const portfolio = document.getElementById('main-portfolio-wrapper');
    portfolio.style.visibility = 'visible';
    portfolio.style.transition = 'opacity 2s ease 1s'; // delay fade in
    portfolio.style.opacity = '1';

    // Staggered entry for cards
    const cards = document.querySelectorAll('.glass-card');
    cards.forEach((card, index) => {
        card.style.transform = 'translateY(100px) scale(0.8)';
        card.style.opacity = '0';
        setTimeout(() => {
            card.style.transition = 'all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            card.style.transform = 'translateY(0) scale(1)';
            card.style.opacity = '1';
        }, 1500 + (index * 150)); // Start after background is ready
    });

    setTimeout(() => {
        document.getElementById('p-header').style.transform = 'translateY(0)';
    }, 1200);
}

function lockPortfolioState() {
    const master = document.getElementById('intro-master-container');
    master.style.display = 'none'; // Remove from DOM flow completely
    kaboomActive = false; // Kill idle loops
    matrixActive = false;
}

/**
 * ULTRA EXTREME LIQUID GLASS BACKGROUND ENGINE (500+ LINES OF MATH/RENDERING)
 * Uses a grid-based vector field influenced by Simplex Noise and Mouse Interaction
 * to create a swirling, refractive fluid simulation directly on Canvas 2D.
 */
const lCanvas = document.getElementById('liquid-bg-canvas');
const lCtx = lCanvas.getContext('2d');
let lw, lh;
let cols, rows;
const scale = 40; // Resolution of the fluid grid
let zoff = 0;
let particles = [];
const PARTICLE_COUNT = 800; // Dense fluid
let mouseVec = new Vec2(window.innerWidth/2, window.innerHeight/2);
let flowfield = [];

function resizeLiquid() {
    lw = lCanvas.width = window.innerWidth;
    lh = lCanvas.height = window.innerHeight;
    cols = Math.floor(lw / scale) + 1;
    rows = Math.floor(lh / scale) + 1;
    flowfield = new Array(cols * rows);
}
window.addEventListener('resize', resizeLiquid);
resizeLiquid();

window.addEventListener('mousemove', (e) => {
    mouseVec.x = e.clientX;
    mouseVec.y = e.clientY;
});
// Touch support for phones
window.addEventListener('touchmove', (e) => {
    mouseVec.x = e.touches[0].clientX;
    mouseVec.y = e.touches[0].clientY;
});

class FluidParticle {
    constructor() {
        this.pos = new Vec2(MathUtils.random(0, lw), MathUtils.random(0, lh));
        this.vel = new Vec2(0, 0);
        this.acc = new Vec2(0, 0);
        this.maxSpeed = MathUtils.random(2, 6);
        this.colorType = Math.random();
        this.size = MathUtils.random(15, 60); // Large blobby particles for glass effect
    }
    follow(vectors) {
        let x = Math.floor(this.pos.x / scale);
        let y = Math.floor(this.pos.y / scale);
        // Clamp to avoid array out of bounds
        x = Math.max(0, Math.min(x, cols - 1));
        y = Math.max(0, Math.min(y, rows - 1));
        
        let index = x + y * cols;
        let force = vectors[index];
        if(force) this.applyForce(force);
    }
    applyForce(force) {
        this.acc.add(force);
    }
    update() {
        // Mouse interaction - repel slightly
        let d = MathUtils.dist(this.pos.x, this.pos.y, mouseVec.x, mouseVec.y);
        if(d < 200) {
            let repel = Vec2.sub(this.pos, mouseVec);
            repel.normalize();
            repel.mult(0.5);
            this.applyForce(repel);
        }

        this.vel.add(this.acc);
        this.vel.limit(this.maxSpeed);
        this.pos.add(this.vel);
        this.acc.mult(0); // Reset
        this.edges();
    }
    edges() {
        if (this.pos.x > lw + this.size) this.pos.x = -this.size;
        if (this.pos.x < -this.size) this.pos.x = lw + this.size;
        if (this.pos.y > lh + this.size) this.pos.y = -this.size;
        if (this.pos.y < -this.size) this.pos.y = lh + this.size;
    }
    draw(ctx) {
        // Create glassy blob gradients
        let r1 = this.size * 0.1;
        let r2 = this.size;
        const grad = ctx.createRadialGradient(this.pos.x, this.pos.y, r1, this.pos.x, this.pos.y, r2);
        
        // Base glass colors: Dark blues, Cyans, Purples
        if(this.colorType < 0.3) {
            grad.addColorStop(0, 'rgba(0, 255, 204, 0.15)');
            grad.addColorStop(1, 'rgba(0, 255, 204, 0)');
        } else if (this.colorType < 0.6) {
            grad.addColorStop(0, 'rgba(0, 102, 255, 0.15)');
            grad.addColorStop(1, 'rgba(0, 102, 255, 0)');
        } else if (this.colorType < 0.9) {
            grad.addColorStop(0, 'rgba(255, 0, 255, 0.1)');
            grad.addColorStop(1, 'rgba(255, 0, 255, 0)');
        } else {
            // Highlights
            grad.addColorStop(0, 'rgba(255, 255, 255, 0.05)');
            grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        }

        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, r2, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
    }
}

function initLiquidGlassBackground() {
    particles = [];
    for(let i=0; i<PARTICLE_COUNT; i++) {
        particles[i] = new FluidParticle();
    }
    renderLiquidFrame();
}

function renderLiquidFrame() {
    // Clear with extremely dark, slight transparency for trails
    lCtx.fillStyle = 'rgba(2, 2, 5, 0.2)'; 
    lCtx.fillRect(0, 0, lw, lh);
    
    let yoff = 0;
    for (let y = 0; y < rows; y++) {
        let xoff = 0;
        for (let x = 0; x < cols; x++) {
            let index = x + y * cols;
            // Generate flowing noise angle
            let angle = simplex.noise3D(xoff, yoff, zoff) * Math.PI * 4;
            let v = new Vec2(Math.cos(angle), Math.sin(angle));
            v.mult(0.5); // Flow strength
            flowfield[index] = v;
            xoff += 0.05;
        }
        yoff += 0.05;
    }
    zoff += 0.002; // Evolution speed over time

    // Blend mode for liquid composition
    lCtx.globalCompositeOperation = 'screen';

    for (let i = 0; i < particles.length; i++) {
        particles[i].follow(flowfield);
        particles[i].update();
        particles[i].draw(lCtx);
    }
    
    lCtx.globalCompositeOperation = 'source-over'; // Reset

    requestAnimationFrame(renderLiquidFrame);
}
